; Produção no container: FPM só aceita FastCGI do Nginx local.
[www]
listen = 127.0.0.1:9000
listen.allowed_clients = 127.0.0.1

; Necessário para o wizard /docker-setup e outras flags via docker-compose env.
; Sem isso, o PHP-FPM limpa o ambiente e `getenv('GETFY_DOCKER')` vira false.
clear_env = no

pm = dynamic
pm.max_children = 20
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
